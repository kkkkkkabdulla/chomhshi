# MySQL
jdbc.driver=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3306/campus_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
jdbc.username=root
jdbc.password=12345678

# Druid
druid.initialSize=5
druid.minIdle=5
druid.maxActive=20
druid.maxWait=60000

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.campus.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Upload (placeholder)
file.upload.path=C:/campus-platform/uploads/
file.access.prefix=http://localhost:8080/ssm/api/upload/file/
